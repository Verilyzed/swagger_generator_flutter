builders:
  swagger_generator:
    import: "package:swagger_generator_flutter/swagger_generator_flutter.dart"
    builder_factories: ["swaggerBuilder"]
    # Default (no-options) extensions. The .models.g.dart and
    # .service.chopper.dart files are produced by json_serializable and
    # chopper_generator (see runs_before), not by this builder.
    build_extensions:
      "{{}}.openapi.json":
        - "{{}}.enums.dart"
        - "{{}}.models.dart"
        - "{{}}.service.dart"
        - "{{}}.client.dart"
        - "{{}}.api.dart"
    auto_apply: dependents
    build_to: source
    runs_before:
      - "json_serializable:json_serializable"
      - "chopper_generator:chopper_generator"
